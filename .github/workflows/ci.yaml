name: CI

on:
  push:
    branches: ["main", "eedorenko/*"]
  workflow_dispatch:

jobs:
  Build_Push_Scheduler_Image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write    
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Login to DockerHub
        uses: docker/login-action@v3 
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Image Tag
        run: |
           MAJOR=${{ vars.MAJOR_VERSION || '0' }}
           MINOR=${{ vars.MINOR_VERSION || '1' }}
           HF=${{ vars.HF_VERSION || '0' }}
           IMAGE_TAG=${MAJOR}.${MINOR}.${HF}-${{ github.run_number }}
           echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV          
           echo $IMAGE_TAG > $GITHUB_WORKSPACE/IMAGE_TAG

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push to GHCR
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: Dockerfile
          tags: docker.io/ssijbabu/kalypso-scheduler:${{ env.IMAGE_TAG }}, docker.io/ssijbabu/kalypso-scheduler:latest
          platforms: ${{ vars.PLATFORMS }}                  

      - name: Upload Image Tags
        uses: actions/upload-artifact@v4.4.3
        with:
          name: image_tag_paris
          path: ${{ github.workspace }}/IMAGE_TAG
  

  Publish_Helm_Chart:  
    runs-on: ubuntu-latest
    needs: [Build_Push_Scheduler_Image]
    permissions:
      contents: write      
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install Go
        uses: actions/setup-go@v2
        with:
          go-version: '1.24'
      
      - name: Install Helmify
        run: |
           wget https://github.com/arttor/helmify/releases/download/v0.3.23/helmify_0.3.23_Linux_64-bit.tar.gz
           tar -xvf helmify_0.3.23_Linux_64-bit.tar.gz
           mv helmify /usr/local/bin

      - name: Build Helm Chart
        run: |
           export IMG=docker.io/ssijbabu/kalypso-scheduler:${{ vars.MAJOR_VERSION }}.${{ vars.MINOR_VERSION }}.${{ vars.HF_VERSION }}-${{ github.run_number }}
           make helm-build

      - name: Publish Helm chart
        uses: ssijbabu/helm-gh-pages@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          charts_dir: ./helm
          charts_url: .
          branch: gh-pages           



